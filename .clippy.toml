# Clippy configuration for WebRTC Chat Application
#
# This file configures Clippy lint rules for the project.
# All warnings are treated as errors (-D warnings).

# Cognitive complexity threshold
cognitive-complexity-threshold = 25

# Documentation requirements
missing-docs-in-crate-items = true

# Type complexity threshold
type-complexity-threshold = 250

# Maximum number of lines in a function
too-many-lines-threshold = 100

# Maximum number of arguments in a function
too-many-arguments-threshold = 7

# Avoid large types passed by value
trivial-copy-types-limit = 16

# Single character binding names to allow
allowed-idents-below-min-chars = ["i", "j", "k", "n", "x", "y", "z", "id", "_"]

# Standard macros that are allowed to have uppercase identifiers
standard-macro-braces = []

# Disallowed methods (prefer alternatives)
disallowed-methods = []

# Disallowed types (prefer alternatives)
disallowed-types = []

# Allow certain lints for specific paths
[lints]
# We want all warnings to be errors
warn = []
deny = ["clippy::all", "clippy::pedantic"]
allow = [
  # Allow some pedantic lints that are too strict for this project
  "clippy::module-name-repetitions",
  "clippy::must-use-candidate",
  "clippy::missing-errors-doc",
  "clippy::missing-panics-doc",
  "clippy::return-self-not-must-use",
]
