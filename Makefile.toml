# Makefile.toml - Task runner for WebRTC Chat Application
# Uses cargo-make (makers) for task management

[config]
skip_core_tasks = true

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

# Default task
[tasks.default]
dependencies = ["dev"]

# ============================================================================
# Development Tasks
# ============================================================================

[tasks.dev]
dependencies = ["build-message", "css-process"]
description = "Start development environment with hot-reload (backend + frontend + CSS watcher)"
workspace = false
script = '''
#!/bin/bash
trap 'kill 0; exit' SIGINT SIGTERM

echo "[dev] Starting development environment..."

# Run initial CSS processing
echo "[dev] Running initial CSS processing..."
./target/release/css-processor frontend/styles frontend/styles-dist

echo "[dev] Starting backend, frontend, and CSS watcher in parallel..."

# Start CSS watcher in background (watches styles/ and rebuilds styles-dist/)
# --dist copies processed CSS directly to Trunk's dist/styles/ for live-reload
# without triggering a full Trunk rebuild cycle.
./target/release/css-processor --watch --dist frontend/dist/styles frontend/styles frontend/styles-dist &

# Start backend watch in background
(cd server && cargo watch -w . -w ../message -x run) &

# Start frontend watch in background
(cd frontend && trunk serve --open) &

# Wait for all background processes
wait
'''

[tasks.run-server]
args = ["run"]
command = "cargo"
cwd = "server"
description = "Run the backend server"
workspace = false

[tasks.run-frontend]
args = ["serve", "--open"]
command = "trunk"
cwd = "frontend"
description = "Start the frontend development server with Trunk"
workspace = false

# ============================================================================
# Setup Tasks
# ============================================================================

[tasks.setup]
dependencies = ["setup-trunk", "setup-wasm-pack", "setup-cargo-watch", "setup-chromedriver", "cov-setup", "cov-setup-rustfilt"]
description = "Install all build dependencies"

[tasks.setup-chromedriver]
description = "Install chromedriver matching the local Chrome version (macOS/Linux)"
workspace = false
script = '''
#!/bin/bash
set -euo pipefail

# --- Detect Chrome version ---
CHROME_VERSION=""
if [[ "$OSTYPE" == "darwin"* ]]; then
  if [ -d "/Applications/Google Chrome.app" ]; then
    CHROME_VERSION=$("/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
  fi
elif [[ "$OSTYPE" == "linux"* ]]; then
  if command -v google-chrome &> /dev/null; then
    CHROME_VERSION=$(google-chrome --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
  elif command -v google-chrome-stable &> /dev/null; then
    CHROME_VERSION=$(google-chrome-stable --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+')
  fi
fi

if [ -z "$CHROME_VERSION" ]; then
  echo "[setup-chromedriver] ⚠️  Chrome not found; skipping chromedriver install"
  exit 0
fi
echo "[setup-chromedriver] Detected Chrome version: $CHROME_VERSION"

# --- Check if chromedriver already matches ---
if command -v chromedriver &> /dev/null; then
  EXISTING_VERSION=$(chromedriver --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' || true)
  CHROME_MAJOR=$(echo "$CHROME_VERSION" | cut -d. -f1)
  EXISTING_MAJOR=$(echo "$EXISTING_VERSION" | cut -d. -f1)
  if [ "$CHROME_MAJOR" = "$EXISTING_MAJOR" ]; then
    echo "[setup-chromedriver] ✅ chromedriver $EXISTING_VERSION already matches Chrome $CHROME_VERSION (same major)"
    exit 0
  fi
  echo "[setup-chromedriver] Existing chromedriver $EXISTING_VERSION does not match Chrome $CHROME_VERSION"
fi

# --- Determine platform ---
ARCH=$(uname -m)
if [[ "$OSTYPE" == "darwin"* ]]; then
  if [ "$ARCH" = "arm64" ]; then
    PLATFORM="mac-arm64"
  else
    PLATFORM="mac-x64"
  fi
elif [[ "$OSTYPE" == "linux"* ]]; then
  PLATFORM="linux64"
else
  echo "[setup-chromedriver] ❌ Unsupported OS: $OSTYPE"
  exit 1
fi

# --- Find the closest chromedriver version for this Chrome milestone ---
MILESTONE=$(echo "$CHROME_VERSION" | cut -d. -f1)
echo "[setup-chromedriver] Looking up chromedriver for milestone $MILESTONE on $PLATFORM ..."

MILESTONES_JSON=$(curl -sSf "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone-with-downloads.json")
DRIVER_URL=$(echo "$MILESTONES_JSON" | python3 -c "
import sys, json
data = json.load(sys.stdin)
milestone = '$MILESTONE'
if milestone not in data.get('milestones', {}):
    print('', end='')
    sys.exit(0)
downloads = data['milestones'][milestone].get('downloads', {}).get('chromedriver', [])
for d in downloads:
    if d['platform'] == '$PLATFORM':
        print(d['url'], end='')
        break
")

if [ -z "$DRIVER_URL" ]; then
  echo "[setup-chromedriver] ❌ No chromedriver found for milestone $MILESTONE / $PLATFORM"
  exit 1
fi

MATCHED_VERSION=$(echo "$MILESTONES_JSON" | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(data['milestones']['$MILESTONE']['version'], end='')
")
echo "[setup-chromedriver] Downloading chromedriver $MATCHED_VERSION from:"
echo "  $DRIVER_URL"

# --- Download & install ---
TMPDIR=$(mktemp -d)
trap 'rm -rf "$TMPDIR"' EXIT

curl -sSfL "$DRIVER_URL" -o "$TMPDIR/chromedriver.zip"
unzip -q "$TMPDIR/chromedriver.zip" -d "$TMPDIR"

# The zip extracts to chromedriver-<platform>/chromedriver
DRIVER_BIN=$(find "$TMPDIR" -name "chromedriver" -type f | head -1)
if [ -z "$DRIVER_BIN" ]; then
  echo "[setup-chromedriver] ❌ chromedriver binary not found in archive"
  exit 1
fi
chmod +x "$DRIVER_BIN"

# Install to /usr/local/bin (or ~/.local/bin for non-root)
INSTALL_DIR="/usr/local/bin"
if [ ! -w "$INSTALL_DIR" ]; then
  INSTALL_DIR="$HOME/.local/bin"
  mkdir -p "$INSTALL_DIR"
  echo "[setup-chromedriver] Installing to $INSTALL_DIR (add to PATH if needed)"
fi

cp "$DRIVER_BIN" "$INSTALL_DIR/chromedriver"
echo "[setup-chromedriver] ✅ chromedriver $MATCHED_VERSION installed to $INSTALL_DIR/chromedriver"
chromedriver --version
'''

[tasks.setup-trunk]
description = "Install Trunk for frontend builds"
install_crate = {crate_name = "trunk", binary = "trunk", test_arg = ["--version"]}

[tasks.setup-wasm-pack]
description = "Install wasm-pack for WASM builds"
install_crate = {crate_name = "wasm-pack", binary = "wasm-pack", test_arg = ["--version"]}

[tasks.setup-cargo-watch]
description = "Install cargo-watch for development watching"
install_crate = {crate_name = "cargo-watch", binary = "cargo-watch", test_arg = ["watch", "--version"]}

# ============================================================================
# CSS Preprocessing Tasks
# ============================================================================

[tasks.css-process]
args = ["build", "--release", "-p", "css-processor"]
command = "cargo"
description = "Build the CSS preprocessor tool"
workspace = false

[tasks.css-expand]
dependencies = ["css-process"]
description = "Run CSS preprocessor to expand composes declarations"
script = '''
#!/bin/bash
set -euo pipefail
./target/release/css-processor frontend/styles frontend/styles-dist
'''
workspace = false

[tasks.css-watch]
dependencies = ["css-process"]
description = "Watch CSS files and rebuild on changes (hot-reload)"
script = '''
#!/bin/bash
set -euo pipefail
./target/release/css-processor --watch frontend/styles frontend/styles-dist
'''
workspace = false

# ============================================================================
# Build Tasks
# ============================================================================

[tasks.build]
dependencies = ["build-message", "build-server", "build-frontend"]
description = "Build all workspace members"
workspace = false

[tasks.build-message]
args = ["build"]
command = "cargo"
cwd = "message"
description = "Build the message crate"
workspace = false

[tasks.build-server]
args = ["build"]
command = "cargo"
cwd = "server"
description = "Build the server crate"
workspace = false

[tasks.build-frontend]
args = ["build"]
command = "trunk"
cwd = "frontend"
description = "Build the frontend crate"
workspace = false

[tasks.build-release]
dependencies = ["build-message-release", "build-server-release", "build-frontend-release"]
description = "Build all workspace members in release mode"
workspace = false

[tasks.build-message-release]
args = ["build", "--release"]
command = "cargo"
cwd = "message"
description = "Build the message crate in release mode"
workspace = false

[tasks.build-server-release]
args = ["build", "--release"]
command = "cargo"
cwd = "server"
description = "Build the server crate in release mode"
workspace = false

[tasks.build-frontend-release]
args = ["build", "--release"]
command = "trunk"
cwd = "frontend"
description = "Build the frontend crate in release mode"
workspace = false

# ============================================================================
# Test Tasks
# ============================================================================

[tasks.test]
dependencies = ["test-unit", "test-integration", "test-wasm", "test-wasm-frontend"]
description = "Run all tests (unit + integration + WASM)"
workspace = false

[tasks.test-unit]
args = ["test", "--lib"]
command = "cargo"
description = "Run unit tests for all workspace members"
workspace = false

[tasks.test-integration]
args = ["test", "--test", "*"]
command = "cargo"
description = "Run integration tests"
ignore_errors = true
workspace = false

[tasks.test-wasm]
args = ["test", "--node"]
command = "wasm-pack"
cwd = "message"
description = "Run WASM tests for message crate"
workspace = false

[tasks.test-wasm-frontend]
description = "Run WASM integration tests for frontend crate (headless browser)"
workspace = false
script = '''
#!/bin/bash
set -euo pipefail
cd frontend
# Use headless browser (chrome/firefox) because these tests need
# real Web APIs (localStorage, window.atob, etc.) that are not
# available in Node.js. Falls back to chrome if available.
if command -v chromedriver &> /dev/null || command -v google-chrome &> /dev/null || [ -d "/Applications/Google Chrome.app" ]; then
  wasm-pack test --headless --chrome
elif command -v geckodriver &> /dev/null || command -v firefox &> /dev/null; then
  wasm-pack test --headless --firefox
else
  echo "[WARN] No headless browser driver found; falling back to --node (localStorage tests will be skipped)"
  wasm-pack test --node
fi
'''

# ============================================================================
# Lint Tasks
# ============================================================================

[tasks.lint]
dependencies = ["fmt-check", "clippy"]
description = "Run all linting checks (fmt + clippy)"

[tasks.fmt]
args = ["fmt", "--all"]
command = "cargo"
description = "Format all code"

[tasks.fmt-check]
args = ["fmt", "--all", "--check"]
command = "cargo"
description = "Check code formatting"

[tasks.clippy]
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
command = "cargo"
description = "Run Clippy with pedantic warnings"

# ============================================================================
# Clean Tasks
# ============================================================================

[tasks.clean]
args = ["clean"]
command = "cargo"
description = "Clean all build artifacts"

[tasks.clean-frontend]
args = ["clean"]
command = "trunk"
cwd = "frontend"
description = "Clean frontend build artifacts"
workspace = false

# ============================================================================
# Docker Tasks
# ============================================================================

[tasks.docker]
args = ["build", "-t", "webrtc-chat:latest", "."]
command = "docker"
description = "Build Docker image"

[tasks.docker-compose]
args = ["up", "-d"]
command = "docker-compose"
description = "Run with docker-compose"

[tasks.docker-stop]
args = ["down"]
command = "docker-compose"
description = "Stop docker-compose services"

# ============================================================================
# WASM Tasks
# ============================================================================

[tasks.wasm-pack-message]
args = ["build", "--target", "web"]
command = "wasm-pack"
cwd = "message"
description = "Build message crate as WASM package"
workspace = false

[tasks.wasm-pack-frontend]
args = ["build", "--target", "web"]
command = "wasm-pack"
cwd = "frontend"
description = "Build frontend crate as WASM package"
workspace = false

# ============================================================================
# Quality Gates
# ============================================================================

[tasks.check-all]
dependencies = ["fmt-check", "check", "clippy", "test-unit"]
description = "Run all quality gates (fmt-check + check + clippy + test)"

[tasks.check]
args = ["check", "--all"]
command = "cargo"
description = "Run cargo check for all workspace members"

# ============================================================================
# Documentation
# ============================================================================

[tasks.docs]
args = ["doc", "--no-deps", "--open"]
command = "cargo"
description = "Generate documentation"

[tasks.docs-all]
args = ["doc", "--open"]
command = "cargo"
description = "Generate documentation with dependencies"

# ============================================================================
# Watch Tasks
# ============================================================================

[tasks.watch-server]
args = ["watch", "-w", ".", "-w", "../message", "-x", "run"]
command = "cargo"
cwd = "server"
description = "Watch server and message crates, rebuild on changes"
workspace = false

[tasks.watch-css]
dependencies = ["css-process"]
description = "Watch CSS source files and rebuild styles-dist on changes"
script = '''
#!/bin/bash
set -euo pipefail
./target/release/css-processor --watch frontend/styles frontend/styles-dist
'''
workspace = false

[tasks.watch-frontend]
args = ["serve", "--open"]
command = "trunk"
cwd = "frontend"
description = "Watch and rebuild frontend on changes (with browser open)"
workspace = false

# ============================================================================
# Benchmark Tasks
# ============================================================================

[tasks.bench]
args = ["bench"]
command = "cargo"
description = "Run benchmarks"

# ============================================================================
# Coverage Tasks
# ============================================================================

[tasks.cov-setup]
description = "Install coverage tools (cargo-llvm-cov)"
install_crate = {crate_name = "cargo-llvm-cov", binary = "cargo-llvm-cov", test_arg = ["llvm-cov", "--version"]}

[tasks.cov-setup-rustfilt]
description = "Install rustfilt for symbol demangling in coverage reports"
install_crate = {crate_name = "rustfilt", binary = "rustfilt", test_arg = ["--help"]}

[tasks.cov]
description = "Run tests with LLVM source-based code coverage and print text report"
run_task = {name = ["cov-clean", "cov-run-text"]}
workspace = false

[tasks.cov-clean]
args = ["llvm-cov", "clean"]
command = "cargo"
description = "Remove artifacts that cargo-llvm-cov has generated in the past"
workspace = false

[tasks.cov-run-text]
args = ["llvm-cov", "--summary-only"]
command = "cargo"
description = "Run tests and display file-level coverage summary table"
workspace = false

[tasks.cov-html]
description = "Run tests with coverage and generate HTML report in target/llvm-cov/html"
run_task = {name = ["cov-clean", "cov-run-html"]}
workspace = false

[tasks.cov-run-html]
args = ["llvm-cov", "--html"]
command = "cargo"
description = "Run tests and generate HTML coverage report"
workspace = false

[tasks.cov-lcov]
description = "Run tests with coverage and export lcov.info"
run_task = {name = ["cov-clean", "cov-run-lcov"]}
workspace = false

[tasks.cov-run-lcov]
args = ["llvm-cov", "--lcov", "--output-path", "lcov.info"]
command = "cargo"
description = "Run tests and export coverage data in lcov format"
workspace = false

[tasks.cov-ci]
description = "Run tests with coverage and export cobertura XML for CI"
run_task = {name = ["cov-clean", "cov-run-ci"]}
workspace = false

[tasks.cov-run-ci]
args = ["llvm-cov", "--cobertura", "--output-path", "coverage.xml", "--ignore-filename-regex", "frontend/"]
command = "cargo"
description = "Run tests and export coverage data in cobertura XML format (excludes frontend WASM crate)"
workspace = false

# ============================================================================
# CI Tasks
# ============================================================================

[tasks.ci]
dependencies = ["fmt-check", "check", "clippy", "test-unit", "test-wasm", "test-wasm-frontend", "build"]
description = "Run all CI checks (including WASM tests)"
