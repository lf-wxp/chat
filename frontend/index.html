<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#3b82f6" />
		<meta name="description" content="WebRTC Multi-User Chat Application" />
		<title>WebRTC Chat</title>

		<!-- Copy preprocessed styles directory to dist (Trunk asset pipeline) -->
		<!-- css-hook.sh runs css-processor: styles/ -> styles-dist/ (expands composes) -->
		<link data-trunk rel="copy-dir" href="styles-dist" data-target-path="styles" />
		<!-- CSS Stylesheet (loaded from copied directory) -->
		<link rel="stylesheet" href="styles/main.css" />

		<!-- Leptos i18n: locale detection for initial page load -->
		<script type="text/javascript">
			// Detect browser locale for initial load
			(function () {
				var stored = localStorage.getItem('locale');
				if (stored) {
					document.documentElement.setAttribute('lang', stored);
					return;
				}
				var lang = navigator.language || navigator.languages[0] || 'en';
				if (lang.startsWith('zh')) lang = 'zh-CN';
				else if (lang.startsWith('en')) lang = 'en';
				else lang = 'en'; // fallback
				document.documentElement.setAttribute('lang', lang);
			})();
		</script>

		<!-- Disable FOUC (Flash of Unstyled Content) -->
		<style>
			html {
				visibility: hidden;
			}
			html[data-theme] {
				visibility: visible;
			}
		</style>
	</head>
	<body>
		<!-- Prevent FOUC: apply initial theme from localStorage -->
		<script type="text/javascript">
			(function () {
				var theme = localStorage.getItem('theme') || 'system';
				var isDark;
				if (theme === 'dark') isDark = true;
				else if (theme === 'light') isDark = false;
				else isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				document.documentElement.setAttribute(
					'data-theme',
					isDark ? 'dark' : 'light',
				);
			})();
		</script>

		<!-- Leptos WASM mount point -->
		<div id="leptos"></div>

		<!-- Trunk will inject WASM loader and CSS here -->

		<!-- CSS_HOT_RELOAD_BEGIN -->
		<!-- CSS Hot-Reload (dev only): subscribes to the css-processor SSE
		     server and hot-swaps only the <link> tags whose source files
		     actually changed. Zero polling: no network traffic when nothing
		     changes. Active only on localhost when Trunk's live-reload WS
		     script is present (i.e. `trunk serve`). In production builds
		     the entire block between CSS_HOT_RELOAD_BEGIN and CSS_HOT_RELOAD_END
		     is physically stripped from dist/index.html by strip-dev-hot-reload.sh
		     (post_build hook), so this code never ships to users. -->
		<script type="text/javascript">
			(function () {
				if (location.hostname !== '127.0.0.1' && location.hostname !== 'localhost') return;

				// The css-processor SSE server (started by `cargo make dev`).
				// Configurable via window.__CSS_HOT_RELOAD_URL__ before this script loads.
				var SSE_URL = window.__CSS_HOT_RELOAD_URL__ || 'http://127.0.0.1:8765/events';

				function boot() {
					// Gate: only activate under `trunk serve` (which injects a WS client script).
					var scripts = document.querySelectorAll('script');
					var hasTrunkWs = false;
					for (var i = 0; i < scripts.length; i++) {
						if (scripts[i].textContent.indexOf('.well-known/trunk/ws') !== -1) {
							hasTrunkWs = true;
							break;
						}
					}
					if (!hasTrunkWs) return;

					if (typeof EventSource === 'undefined') {
						console.warn('[css-hot-reload] EventSource unsupported; hot-reload disabled');
						return;
					}

					// Reload stylesheets: prefer precise match on changed files, but
					// fall back to reloading all <link rel="stylesheet"> tags when
					// no direct match is found. This handles the common case where
					// the changed source (e.g. base.css) is only transitively
					// composed into the entry sheet (main.css) via `composes`.
					function reloadChanged(files) {
						var links = document.querySelectorAll('link[rel="stylesheet"]');
						if (!links.length) return;

						var matched = [];
						if (files && files.length) {
							for (var i = 0; i < links.length; i++) {
								var link = links[i];
								var hrefRaw = link.getAttribute('href') || '';
								var hrefPath = hrefRaw.split('?')[0];
								for (var j = 0; j < files.length; j++) {
									if (hrefPath === files[j] || hrefPath.indexOf(files[j]) !== -1) {
										matched.push(link);
										break;
									}
								}
							}
						}

						var targets = matched.length ? matched : Array.prototype.slice.call(links);
						var ts = Date.now();
						for (var k = 0; k < targets.length; k++) {
							var t = targets[k];
							var base = (t.getAttribute('href') || '').split('?')[0];
							if (base) t.href = base + '?t=' + ts;
						}
						console.log(
							'[css-hot-reload] Reloaded ' + targets.length +
							' stylesheet(s)' + (matched.length ? ' (matched)' : ' (fallback)') +
							':', files || []
						);
					}

					function connect() {
						var es = new EventSource(SSE_URL);

						es.addEventListener('rebuild', function (ev) {
							var payload = { files: [] };
							try {
								payload = JSON.parse(ev.data);
							} catch (e) {
								console.warn('[css-hot-reload] Invalid rebuild payload:', ev.data);
								return;
							}
							reloadChanged(payload.files || []);
						});

						es.onopen = function () {
							console.log('[css-hot-reload] Connected to ' + SSE_URL);
						};

						es.onerror = function () {
							// Built-in EventSource auto-reconnects respecting the server's
							// `retry:` hint. Log quietly to avoid console spam on reload.
							// (No action needed here.)
						};
					}

					connect();
				}

				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', boot);
				} else {
					boot();
				}
			})();
		</script>
		<!-- CSS_HOT_RELOAD_END -->
	</body>
</html>
